<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      *:not(dialog) {
        margin: 0;
        padding: 0;
      }

      :root {
        --font-serif: Charter, "Bitstream Charter", "Sitka Text", Cambria, serif;
        --font-sans: Optima, Candara, "Noto Sans", source-sans-pro, sans-serif;
        font-weight: normal;
      }

      .content {
        max-width: 65ch;
        margin: 0 auto;
      }

      html {
        scroll-padding-top: 33%;
      }

      body {
        width: 100%;
        padding: 2em;
        font-family: var(--font-serif);
        font-weight: normal;
        background-color: black;
        color: whitesmoke;
      }

      h1 {
        margin-bottom: 1rem;
        font-family: var(--font-sans);
      }

      a {
        text-decoration: none;
        color: gray;
      }

      a:visited {
        color: gray;
      }

      li {
        list-style: none;
      }

      :target {
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1>Conversations</h1>
      <ul>
        {{ range . }}
        <li id="conv-{{ .Name }}"><a href="/conversation/{{ .Name }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </div>
  </body>
</html>
